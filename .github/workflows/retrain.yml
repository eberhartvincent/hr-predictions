# .github/workflows/retrain.yml
# =====================================================================
#  MLB HR Predictor — Weekly Model Retraining
# =====================================================================
#
#  Runs every Monday at 6 AM ET (10:00 UTC) — off-season safe,
#  the job exits cleanly if no FanGraphs data is available yet.
#
#  What it does:
#    1. Pulls 3 seasons of FanGraphs batting stats via pybaseball
#       (includes Statcast metrics: Barrel%, EV, HardHit%, FB%, etc.)
#    2. Builds year-N → year-(N+1) training pairs (no look-ahead bias)
#    3. Trains XGBoost regressor to predict HR/PA talent rate
#    4. Evaluates via 5-fold cross-validation and logs MAE + R²
#    5. Commits models/hr_model.json + models/feature_metadata.json
#       back to the repo so the daily job picks them up automatically
#
#  Manual trigger: Actions → Retrain HR Model → Run workflow
#
#  No extra secrets required — uses GITHUB_TOKEN for the commit.
#
# =====================================================================

name: 🔁 Retrain HR Model

on:
  schedule:
    - cron: "0 10 * * 1"   # Every Monday 6 AM ET

  workflow_dispatch:
    inputs:
      years:
        description: "Training years (comma-separated, e.g. 2022,2023,2024,2025,2026)"
        required: false
        default: "2022,2023,2024,2025,2026"
        type: string
      dry_run:
        description: "Train but don't commit model to repo"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

jobs:
  retrain:
    name: Train XGBoost HR Model
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: write   # needed to commit model files back to repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # Cache pybaseball downloads — FanGraphs season stats are stable
      # and don't change for past seasons, so a weekly cache is safe.
      - name: Cache pybaseball data
        uses: actions/cache@v4
        with:
          path: ~/.pybaseball
          key: pybaseball-retrain-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            pybaseball-retrain-${{ runner.os }}-

      - name: Train model
        run: |
          YEARS="${{ github.event.inputs.years || '2022,2023,2024,2025,2026' }}"
          python - << EOF
          import logging, sys
          logging.basicConfig(
              level=logging.INFO,
              format="%(asctime)s  %(levelname)-8s  %(name)s — %(message)s",
              datefmt="%H:%M:%S",
          )
          from src.models.train import train
          years = [int(y.strip()) for y in "${YEARS}".split(",")]
          try:
              meta = train(years=years)
              print(f"::notice::Training complete — CV R²={meta['cv_r2']:.4f}, MAE={meta['cv_mae']:.5f}, n={meta['n_training']}")
          except Exception as e:
              print(f"::error::Training failed: {e}")
              sys.exit(1)
          EOF

      - name: Show model metrics
        run: |
          python - << 'EOF'
          import json
          from pathlib import Path
          meta = json.loads(Path("models/feature_metadata.json").read_text())
          print("=" * 50)
          print("MODEL SUMMARY")
          print("=" * 50)
          print(f"Training years : {meta['training_years']}")
          print(f"Training examples: {meta['n_training']}")
          print(f"Features       : {meta['features']}")
          print(f"CV R²          : {meta['cv_r2']:.4f}")
          print(f"CV MAE         : {meta['cv_mae']:.5f} HR/PA")
          print(f"LG avg HR/PA   : {meta['lg_hr_pa']:.4f}")
          print("\nFeature Importance:")
          for feat, imp in meta['feature_importance'].items():
              bar = "█" * int(imp * 100)
              print(f"  {feat:20s} {imp:.4f}  {bar}")
          EOF

      - name: Commit model to repository
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add models/hr_model.json models/feature_metadata.json

          # Only commit if something actually changed
          if git diff --staged --quiet; then
            echo "Model unchanged — nothing to commit."
          else
            METRICS=$(python -c "
          import json
          from pathlib import Path
          m = json.loads(Path('models/feature_metadata.json').read_text())
          print(f\"R²={m['cv_r2']:.4f} MAE={m['cv_mae']:.5f} n={m['n_training']}\")
          ")
            git commit -m "chore: retrain HR model [${METRICS}]

          Training years: ${{ github.event.inputs.years || '2022,2023,2024,2025,2026' }}
          Run: ${{ github.run_id }}"
            git push
            echo "✅ Model committed and pushed."
          fi

      - name: Upload model artifact (backup)
        uses: actions/upload-artifact@v4
        with:
          name: hr-model-${{ github.run_id }}
          path: |
            models/hr_model.json
            models/feature_metadata.json
          retention-days: 90
