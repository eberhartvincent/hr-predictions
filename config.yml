# ============================================================
#  MLB Home Run Predictor — Configuration
# ============================================================

prediction:
  date: "today"
  top_n_hr:    10    # Home runs
  top_n_tb:    10    # Total bases
  top_n_hrbi:  10    # H + R + RBI combined
  top_n_rbi:   10    # RBI only
  # legacy top_n still works — overrides all four if set
  top_n: 10
  min_pa_season: 30
  min_games_played: 10

model:
  weights:
    barrel_rate:      0.25
    exit_velocity:    0.15
    hr_rate:          0.20
    pitcher_factor:   0.18
    park_factor:      0.10
    weather_factor:   0.07
    platoon_factor:   0.03
    recent_form:      0.02

  recent_form_games: 15
  career_season_blend: 0.35
  min_ip_pitcher: 10

  # League averages (2022-25 MLB)
  lg_hr_per_pa:   0.033
  lg_tb_per_pa:   0.358    # SLG ~.411 × AB/PA ~.872
  lg_h_per_pa:    0.216    # AVG ~.248 × AB/PA ~.872
  lg_r_per_game:  0.490    # ~4.4 R/team/game ÷ 9 players
  lg_rbi_per_game: 0.490
  lg_era:         4.20
  lg_pa_per_game: 4.1

email:
  subject: "⚾ MLB Predictions — {date}"
  from_name: "MLB Predictor"

weather:
  covered_stadiums:
    - "Minute Maid Park"
    - "Globe Life Field"
    - "American Family Field"
    - "Chase Field"
    - "Tropicana Field"
    - "Rogers Centre"
    - "T-Mobile Park"
    - "loanDepot park"
    - "Daikin Park"
  temp_baseline_f: 70
  temp_effect_per_10f: 0.012
  wind_out_boost: 0.10
  wind_in_penalty: -0.10
  wind_threshold_mph: 10

